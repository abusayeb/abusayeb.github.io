<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Md Abu Sayeb Rayhan | AI Engineer, Computer Vision &amp; LLMs</title>
<meta name="description" content="AI Engineer and Data Scientist specialising in computer vision, large language models and RAG systems. Eighteen months deploying production perception pipelines in Japan. Three peer-reviewed publications.">
<meta name="author" content="Md Abu Sayeb Rayhan">
<meta property="og:title" content="Md Abu Sayeb Rayhan | AI Engineer">
<meta property="og:description" content="Computer vision, LLMs and RAG. Production AI systems. Published in IEEE Xplore and Springer Nature.">
<meta property="og:type" content="website">
<link rel="icon" href="https://github.com/abusayeb.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0a0e17;--bg-2:#0f1521;--card:#131a28;--card-2:#172032;
  --line:#1f2a3d;--line-2:#2a3852;
  --text:#e8edf7;--muted:#94a3b8;--dim:#64748b;
  --accent:#38bdf8;--accent-2:#22d3ee;--accent-dim:rgba(56,189,248,.12);
  --gold:#fbbf24;--max:1080px;
}
html{scroll-behavior:smooth;-webkit-text-size-adjust:100%}
body{background:var(--bg);color:var(--text);font-family:'Inter',-apple-system,sans-serif;
  line-height:1.65;font-size:16px;overflow-x:hidden;-webkit-font-smoothing:antialiased}
a{color:inherit;text-decoration:none}
::selection{background:var(--accent);color:#04121c}
body::before{content:'';position:fixed;top:-30%;left:50%;transform:translateX(-50%);
  width:1100px;height:700px;pointer-events:none;z-index:0;
  background:radial-gradient(ellipse at center,rgba(56,189,248,.10),transparent 65%);filter:blur(40px)}

.kw{color:var(--accent);font-weight:650}

nav{position:fixed;top:0;left:0;right:0;z-index:100;background:rgba(10,14,23,.82);
  backdrop-filter:blur(14px);border-bottom:1px solid transparent;transition:border-color .3s,background .3s}
nav.scrolled{border-bottom-color:var(--line);background:rgba(10,14,23,.94)}
.nav-in{max-width:var(--max);margin:0 auto;padding:0 28px;height:62px;
  display:flex;align-items:center;justify-content:space-between;gap:24px}
.brand{font-weight:700;font-size:15px;letter-spacing:-.01em;white-space:nowrap}
.brand span{color:var(--accent)}
.nav-links{display:flex;gap:24px;align-items:center}
.nav-links a{font-size:14px;color:var(--muted);font-weight:500;transition:color .2s;
  position:relative;padding:4px 0}
.nav-links a:hover{color:var(--text)}
.nav-links a::after{content:'';position:absolute;bottom:0;left:0;width:0;height:1.5px;
  background:var(--accent);transition:width .25s}
.nav-links a:hover::after{width:100%}
.nav-research{color:var(--accent) !important;font-weight:600}
.nav-cv{background:var(--accent);color:#04121c !important;padding:7px 15px;border-radius:7px;
  font-weight:600;font-size:13.5px;transition:all .2s}
.nav-cv:hover{background:var(--accent-2);transform:translateY(-1px)}
.nav-cv::after{display:none !important}
.menu-btn{display:none;background:none;border:none;color:var(--text);font-size:24px;cursor:pointer;padding:4px}

.wrap{max-width:var(--max);margin:0 auto;padding:0 28px;position:relative;z-index:1}
section{padding:86px 0;scroll-margin-top:62px}
.sec-head{margin-bottom:40px}
.sec-tag{font-family:'JetBrains Mono',monospace;font-size:12px;color:var(--accent);
  letter-spacing:.14em;text-transform:uppercase;margin-bottom:10px;display:block;font-weight:500}
.sec-title{font-size:clamp(26px,4vw,34px);font-weight:700;letter-spacing:-.025em;line-height:1.2}
.sec-sub{color:var(--muted);margin-top:10px;font-size:15.5px;max-width:660px}
.sec-sub a{color:var(--accent);border-bottom:1px solid var(--accent)}

.hero{padding:146px 0 78px}
.hero-top{display:flex;gap:30px;align-items:flex-start;margin-bottom:6px}
.hero-copy{flex:1;min-width:0}
.portrait-wrap{flex-shrink:0;padding-top:6px}
.portrait-frame{width:210px;height:210px;border-radius:50%;overflow:hidden;
  border:2px solid var(--line-2);box-shadow:0 12px 40px rgba(0,0,0,.45)}
.portrait{width:100%;height:100%;object-fit:cover;display:block}
.hero-badge{display:inline-flex;align-items:center;gap:8px;background:var(--accent-dim);
  border:1px solid rgba(56,189,248,.25);color:var(--accent);padding:6px 14px;
  border-radius:100px;font-size:13px;font-weight:500;margin-bottom:24px}
.pulse{width:7px;height:7px;border-radius:50%;background:var(--accent);
  box-shadow:0 0 0 0 rgba(56,189,248,.7);animation:pulse 2.4s infinite}
@keyframes pulse{0%{box-shadow:0 0 0 0 rgba(56,189,248,.6)}
  70%{box-shadow:0 0 0 9px rgba(56,189,248,0)}100%{box-shadow:0 0 0 0 rgba(56,189,248,0)}}
.hero h1{font-size:clamp(38px,7vw,60px);font-weight:800;line-height:1.05;
  letter-spacing:-.035em;margin-bottom:16px}
.hero h1 .grad{background:linear-gradient(120deg,var(--accent) 0%,var(--accent-2) 50%,#a78bfa 100%);
  -webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent}
.hero-role{font-size:clamp(17px,2.6vw,21px);color:var(--text);font-weight:600;
  margin-bottom:18px;letter-spacing:-.01em}
.hero-role em{color:var(--accent);font-style:normal}
.hero-desc{font-size:16.5px;color:var(--muted);max-width:620px;margin-bottom:30px;line-height:1.75}
.hero-cta{display:flex;gap:13px;flex-wrap:wrap;margin-bottom:18px}
.btn{display:inline-flex;align-items:center;gap:8px;padding:12px 22px;border-radius:9px;
  font-weight:600;font-size:14.5px;transition:all .22s;border:1px solid transparent;cursor:pointer}
.btn-1{background:var(--accent);color:#04121c}
.btn-1:hover{background:var(--accent-2);transform:translateY(-2px);box-shadow:0 8px 22px rgba(56,189,248,.28)}
.btn-2{background:transparent;border-color:var(--line-2);color:var(--text)}
.btn-2:hover{border-color:var(--accent);color:var(--accent);transform:translateY(-2px)}
.hero-meta{display:flex;gap:22px;flex-wrap:wrap;color:var(--dim);font-size:14px;padding-top:8px}

.metrics{display:grid;grid-template-columns:repeat(4,1fr);gap:1px;background:var(--line);
  border:1px solid var(--line);border-radius:14px;overflow:hidden;margin-top:48px}
.metric{background:var(--bg-2);padding:26px 22px;transition:background .25s}
.metric:hover{background:var(--card-2)}
.metric-n{font-size:clamp(28px,4.4vw,38px);font-weight:800;letter-spacing:-.035em;
  color:var(--accent);line-height:1;margin-bottom:8px}
.metric-l{font-size:13px;color:var(--muted);line-height:1.45}

.card{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:26px;transition:all .25s}
.card:hover{border-color:var(--line-2);background:var(--card-2);transform:translateY(-2px)}

.tl{position:relative;padding-left:30px}
.tl::before{content:'';position:absolute;left:6px;top:8px;bottom:8px;width:1.5px;
  background:linear-gradient(180deg,var(--accent),var(--line) 85%)}
.tl-item{position:relative;padding-bottom:36px}
.tl-item:last-child{padding-bottom:0}
.tl-item::before{content:'';position:absolute;left:-30px;top:7px;width:13px;height:13px;
  border-radius:50%;background:var(--bg);border:2.5px solid var(--accent)}
.tl-item.past::before{border-color:var(--line-2)}
.tl-date{font-family:'JetBrains Mono',monospace;font-size:12px;color:var(--accent);
  margin-bottom:6px;font-weight:500}
.tl-item.past .tl-date{color:var(--dim)}
.tl-role{font-size:18px;font-weight:680;letter-spacing:-.015em;margin-bottom:3px}
.tl-org{color:var(--muted);font-size:14.5px;margin-bottom:12px}
.tl-list{list-style:none;display:flex;flex-direction:column;gap:9px}
.tl-list li{position:relative;padding-left:19px;color:var(--muted);font-size:14.8px;line-height:1.62}
.tl-list li::before{content:'';position:absolute;left:0;top:9px;width:5px;height:5px;
  border-radius:50%;background:var(--line-2)}

.projects{display:grid;grid-template-columns:repeat(2,1fr);gap:18px}
.proj{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:26px;
  transition:all .25s;display:flex;flex-direction:column}
.proj:hover{border-color:rgba(56,189,248,.4);background:var(--card-2);transform:translateY(-3px)}
.proj-top{display:flex;justify-content:space-between;align-items:flex-start;gap:14px;margin-bottom:11px}
.proj-title{font-size:17.5px;font-weight:680;letter-spacing:-.018em;line-height:1.3}
.proj-date{font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--dim);
  white-space:nowrap;padding-top:4px}
.proj-desc{color:var(--muted);font-size:14.6px;line-height:1.65;margin-bottom:16px;flex:1}
.proj-impact{display:inline-flex;align-items:center;gap:7px;font-size:13px;font-weight:600;
  color:var(--accent);background:var(--accent-dim);padding:6px 12px;border-radius:6px;
  margin-bottom:15px;align-self:flex-start}
.tags{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:14px}
.tag{font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--dim);background:var(--bg-2);
  border:1px solid var(--line);padding:3.5px 9px;border-radius:5px}
.proj-link{font-size:13.5px;color:var(--accent);font-weight:600;display:inline-flex;
  align-items:center;gap:6px;transition:gap .2s;margin-top:auto}
.proj-link:hover{gap:10px}
.proj-role{font-size:13.5px;color:var(--dim);margin-top:auto}

.skills{display:grid;grid-template-columns:repeat(2,1fr);gap:16px}
.sk-cat{background:var(--card);border:1px solid var(--line);border-radius:13px;padding:22px 24px}
.sk-h{font-family:'JetBrains Mono',monospace;font-size:11.5px;color:var(--accent);
  letter-spacing:.1em;text-transform:uppercase;margin-bottom:14px;font-weight:500}
.sk-items{display:flex;gap:7px;flex-wrap:wrap}
.sk{font-size:13.2px;color:var(--muted);background:var(--bg-2);border:1px solid var(--line);
  padding:5px 11px;border-radius:6px;transition:all .2s}
.sk:hover{color:var(--text);border-color:var(--line-2);background:var(--card-2)}

.pubs{display:flex;flex-direction:column;gap:16px}
.pub{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:24px 26px;
  transition:all .25s;border-left:3px solid var(--accent)}
.pub:hover{background:var(--card-2);border-left-color:var(--accent-2);transform:translateX(3px)}
.pub-title{font-size:16.5px;font-weight:650;line-height:1.45;margin-bottom:12px;letter-spacing:-.012em}
.pub-meta{display:flex;gap:9px;flex-wrap:wrap;align-items:center}
.venue{font-family:'JetBrains Mono',monospace;font-size:11.5px;font-weight:500;padding:4px 10px;
  border-radius:5px;background:var(--accent-dim);color:var(--accent);border:1px solid rgba(56,189,248,.22)}
.venue.idx{background:rgba(251,191,36,.1);color:var(--gold);border-color:rgba(251,191,36,.25)}
.pub-note{color:var(--dim);font-size:13px}

.edu{display:grid;grid-template-columns:1fr auto;gap:20px;align-items:start;background:var(--card);
  border:1px solid var(--line);border-radius:14px;padding:28px}
.edu-deg{font-size:18.5px;font-weight:680;letter-spacing:-.015em;margin-bottom:4px}
.edu-school{color:var(--muted);font-size:15px;margin-bottom:16px}
.edu-gpa{font-family:'JetBrains Mono',monospace;font-size:13px;color:var(--accent);
  background:var(--accent-dim);padding:6px 13px;border-radius:7px;white-space:nowrap;
  border:1px solid rgba(56,189,248,.22)}
.thesis{border-top:1px solid var(--line);padding-top:16px}
.thesis-l{font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--dim);
  letter-spacing:.1em;text-transform:uppercase;margin-bottom:7px}
.thesis-t{font-size:15px;font-weight:620;margin-bottom:7px}
.thesis-d{color:var(--muted);font-size:14.2px;line-height:1.65}

.extras{display:grid;grid-template-columns:repeat(2,1fr);gap:16px;margin-top:20px}
.ex-h{font-family:'JetBrains Mono',monospace;font-size:11.5px;color:var(--accent);
  letter-spacing:.1em;text-transform:uppercase;margin-bottom:13px;font-weight:500}
.ex-list{list-style:none;display:flex;flex-direction:column;gap:10px}
.ex-list li{color:var(--muted);font-size:13.8px;line-height:1.55;padding-left:15px;position:relative}
.ex-list li::before{content:'';position:absolute;left:0;top:8px;width:4px;height:4px;
  border-radius:50%;background:var(--accent)}
.ex-list li b{color:var(--text);font-weight:640}

.contact{background:linear-gradient(135deg,var(--card) 0%,var(--bg-2) 100%);
  border:1px solid var(--line);border-radius:18px;padding:50px 40px;text-align:center}
.contact h2{font-size:clamp(25px,4vw,33px);font-weight:750;letter-spacing:-.028em;margin-bottom:14px}
.contact p{color:var(--muted);max-width:540px;margin:0 auto 28px;font-size:15.8px;line-height:1.7}
.contact-links{display:flex;gap:13px;justify-content:center;flex-wrap:wrap}

footer{border-top:1px solid var(--line);padding:30px 0;margin-top:70px;text-align:center;
  color:var(--dim);font-size:13.5px}
footer a{color:var(--muted)}
footer a:hover{color:var(--accent)}

#loading{padding:140px 28px;text-align:center;color:var(--muted)}
#loadError{display:none;padding:140px 28px;text-align:center;max-width:620px;margin:0 auto}
#loadError a{color:var(--accent);text-decoration:underline}

@media(max-width:900px){
  .metrics{grid-template-columns:repeat(2,1fr)}
  .projects,.skills,.extras{grid-template-columns:1fr}
}
@media(max-width:820px){
  .hero-top{flex-direction:column-reverse;gap:22px;align-items:flex-start}
  .portrait-frame{width:140px;height:140px}
}
@media(max-width:700px){
  .nav-links{position:fixed;top:62px;left:0;right:0;background:var(--bg-2);flex-direction:column;
    align-items:stretch;gap:0;padding:0;border-bottom:1px solid var(--line);max-height:0;
    overflow:hidden;transition:max-height .3s ease}
  .nav-links.open{max-height:420px}
  .nav-links a{padding:14px 28px;border-bottom:1px solid var(--line);font-size:15px}
  .nav-links a::after{display:none}
  .nav-cv{margin:14px 28px;text-align:center;border-bottom:none !important}
  .menu-btn{display:block}
  section{padding:60px 0}
  .hero{padding:104px 0 56px}
  .wrap,.nav-in{padding:0 20px}
  .edu{grid-template-columns:1fr}
  .contact{padding:36px 24px}
  .tl{padding-left:24px}
  .tl-item::before{left:-24px}
}
@media(prefers-reduced-motion:reduce){
  *{animation:none !important;transition:none !important}
  html{scroll-behavior:auto}
}
</style>
</head>

<script>
function esc(s){ return String(s==null?'':s)
  .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
function rich(s){ return esc(s).replace(/\*\*(.+?)\*\*/g,'<span class="kw">$1</span>'); }
// Papers under review aren't peer-reviewed yet - don't count them as such.
function pubMetaCount(d){
  return (d.publications||[]).filter(function(p){
    return !/review/i.test(String(p.status||''));
  }).length;
}
// Published work first, then in press, then under review.
function pubRank(p){
  var s = String(p.status||'').toLowerCase();
  if(s.indexOf('review') > -1) return 2;
  if(s.indexOf('press')  > -1) return 1;
  return 0;
}
function sortPubs(list){
  return (list||[]).slice().sort(function(a,b){ return pubRank(a) - pubRank(b); });
}

function render(d){
  var P = d.profile||{}, out = [];
  document.title = P.name + ' | ' + P.roleIndustry + ', ' + P.specialismIndustry;
  var parts = String(P.name||'').trim().split(' ');
  document.getElementById('brand').innerHTML =
    esc(parts.slice(0,-1).join(' ')) + ' <span>' + esc(parts[parts.length-1]) + '</span>';

  /* hero */
  out.push('<header class="hero"><div class="wrap"><div class="hero-top"><div class="hero-copy">' +
    (P.availabilityIndustry ? '<div class="hero-badge"><span class="pulse"></span> ' + esc(P.availabilityIndustry) + '</div>' : '') +
    '<h1>' + esc(parts.slice(0,-1).join(' ')) + '<br><span class="grad">' + esc(parts[parts.length-1]) + '</span></h1>' +
    '<div class="hero-role">' + esc(P.roleIndustry) + ' · <em>' + esc(P.specialismIndustry) + '</em></div>' +
    '<p class="hero-desc">' + rich(P.summaryIndustry) + '</p></div>' +
    '<div class="portrait-wrap" id="portraitWrap" hidden><div class="portrait-frame">' +
      '<img class="portrait" id="portraitImg" alt="' + esc(P.name) + '" style="' +
      'object-position:' + esc(P.photoFocus || '50% 50%') + ';' +
      'transform:scale(' + (parseFloat(P.photoZoom) || 1) + ')"></div></div>' +
    '</div><div class="hero-cta">' +
      '<a href="#contact" class="btn btn-1">Get in touch →</a>' +
      '<a href="' + esc((d.cv||{}).industry) + '" class="btn btn-2" target="_blank" rel="noopener">Download CV</a>' +
      '<a href="research/" class="btn btn-2">Research portfolio →</a>' +
    '</div><div class="hero-meta">' +
      '<span>📍 ' + esc(P.location) + '</span>' +
      '<span>🎓 ' + esc((d.education||{}).degree) + '</span>' +
      '<span>📄 ' + pubMetaCount(d) + ' peer-reviewed publications</span>' +
    '</div>' +
    ((d.metrics||[]).length ? '<div class="metrics">' + d.metrics.map(function(m){
      return '<div class="metric"><div class="metric-n">' + esc(m.value) + '</div>' +
             '<div class="metric-l">' + esc(m.label) + '</div></div>'; }).join('') + '</div>' : '') +
    '</div></header>');

  var n = 0;
  function head(id, title, sub){
    n++;
    return '<section id="' + id + '"><div class="wrap"><div class="sec-head">' +
      '<span class="sec-tag">' + (n<10?'0':'') + n + ' · ' + title + '</span>' +
      '<h2 class="sec-title">' + title + '</h2>' +
      (sub ? '<p class="sec-sub">' + sub + '</p>' : '') + '</div>';
  }

  /* experience */
  out.push(head('experience','Experience','') +
    '<div class="tl">' + (d.experience||[]).map(function(e,i){
      return '<div class="tl-item' + (i>0?' past':'') + '">' +
        '<div class="tl-date">' + esc(e.start) + ' \u2013 ' + esc(e.end) +
          (e.location ? ' · ' + esc(e.location) : '') + '</div>' +
        '<div class="tl-role">' + esc(e.role) +
          (e.note ? ' <span style="font-weight:400;color:var(--dim);font-size:14px">(' + esc(e.note) + ')</span>' : '') +
        '</div>' +
        '<div class="tl-org">' + esc(e.org) + (e.team ? ' · ' + esc(e.team) : '') + '</div>' +
        '<ul class="tl-list">' + (e.bullets||[]).map(function(b){
          return '<li>' + rich(b) + '</li>'; }).join('') + '</ul></div>';
    }).join('') + '</div></div></section>');

  /* skills — recruiters keyword-scan the stack before reading project detail,
     so this comes right after Experience */
  out.push(head('skills','Skills','') +
    '<div class="skills">' + (d.skills||[]).map(function(s){
      return '<div class="sk-cat"><div class="sk-h">' + esc(s.label) + '</div><div class="sk-items">' +
        String(s.items||'').split('·').map(function(x){
          return '<span class="sk">' + esc(x.trim()) + '</span>'; }).join('') +
        '</div></div>';
    }).join('') + '</div></div></section>');

  /* projects */
  out.push(head('projects','Projects','Production systems and research prototypes. Code for open projects lives on GitHub.') +
    '<div class="projects">' + (d.projects||[]).map(function(p){
      return '<article class="proj"><div class="proj-top">' +
        '<div class="proj-title">' + esc(p.title) + '</div>' +
        '<div class="proj-date">' + esc(p.date) + '</div></div>' +
        '<p class="proj-desc">' + rich(p.desc) + '</p>' +
        (p.impact ? '<div class="proj-impact">⚡ ' + esc(p.impact) + '</div>' : '') +
        '<div class="tags">' + (p.tags||[]).map(function(t){
          return '<span class="tag">' + esc(t) + '</span>'; }).join('') + '</div>' +
        (p.link ? '<a href="' + esc(p.link) + '" class="proj-link" target="_blank" rel="noopener">View on GitHub →</a>'
                : (p.role ? '<span class="proj-role">' + esc(p.role) + '</span>' : '')) +
      '</article>';
    }).join('') + '</div></div></section>');

  /* publications */
  var pubCount = (d.publications||[]).filter(function(p){
    return !/review/i.test(String(p.status||''));
  }).length;
  out.push(head('publications','Publications',
      pubCount + ' peer-reviewed papers. Full detail on the <a href="research/">research portfolio</a>.') +
    '<div class="pubs">' + sortPubs(d.publications).map(function(p){
      var t = p.link ? '<a href="' + esc(p.link) + '" target="_blank" rel="noopener">' + esc(p.title) + '</a>' : esc(p.title);
      return '<article class="pub"><div class="pub-title">' + t + '</div><div class="pub-meta">' +
        (p.tags||[]).map(function(x){
          return '<span class="venue' + (/springer|scopus/i.test(x)?' idx':'') + '">' + esc(x) + '</span>';
        }).join('') +
        (p.status ? '<span class="pub-note">' + esc(p.status) + '</span>' : '') +
        '</div></article>';
    }).join('') + '</div></div></section>');

  /* education + extras */
  var E = d.education||{};
  out.push(head('education','Education','') +
    '<div class="edu"><div>' +
      '<div class="edu-deg">' + esc(E.degree) + '</div>' +
      '<div class="edu-school">' + esc(E.school) + ' · ' + esc(E.start) + ' \u2013 ' + esc(E.end) + '</div>' +
      (E.thesisTitle ? '<div class="thesis"><div class="thesis-l">' + esc(E.thesisLabel) + '</div>' +
        '<div class="thesis-t">' + esc(E.thesisTitle) + '</div>' +
        '<div class="thesis-d">' + rich(E.thesisDesc) + '</div></div>' : '') +
    '</div><div class="edu-gpa">' + esc(E.grade) + '</div></div>' +
    '<div class="extras">' +
      ((d.awards||[]).length ? '<div class="card"><div class="ex-h">Awards &amp; activities</div><ul class="ex-list">' +
        d.awards.map(function(a){ return '<li><b>' + esc(a.title) + '</b>' + esc(a.detail) +
          ' <span style="color:var(--dim)">(' + esc(a.year) + ')</span></li>'; }).join('') + '</ul></div>' : '') +
      ((d.talks||[]).length ? '<div class="card"><div class="ex-h">Conference presentations</div><ul class="ex-list">' +
        d.talks.map(function(t){ return '<li><b>' + esc(t.venue) + '</b>' + esc(t.title) + '</li>'; }).join('') +
        '</ul></div>' : '') +
    '</div></div></section>');

  /* contact */
  out.push('<section id="contact"><div class="wrap"><div class="contact">' +
    '<h2>Let’s build something</h2>' +
    '<p>I’m open to AI engineering and data science roles, especially anything involving applied ' +
    'computer vision, real-time perception systems or retrieval-augmented language models. ' +
    'If that sounds like your team, I’d be glad to hear from you.</p>' +
    '<div class="contact-links">' +
      '<a href="mailto:' + esc(P.email) + '" class="btn btn-1">✉ ' + esc(P.email) + '</a>' +
      '<a href="' + esc(P.linkedin) + '" class="btn btn-2" target="_blank" rel="noopener">LinkedIn</a>' +
      '<a href="' + esc(P.github) + '" class="btn btn-2" target="_blank" rel="noopener">GitHub</a>' +
    '</div></div></div></section>');

  var app = document.getElementById('app');
  app.innerHTML = out.join('');
  app.hidden = false;
  document.getElementById('loading').style.display='none';
  document.getElementById('footName').textContent = P.name||'';
  document.getElementById('footLoc').textContent = P.location||'';
  document.getElementById('yr').textContent = new Date().getFullYear();
  document.getElementById('foot').hidden = false;
  wireUp();
  loadPortrait(P.photo, '');
}

// Try the configured photo filename, then common variants, so an upload named
// slightly differently still shows up instead of silently failing.
function loadPortrait(configured, prefix){
  var img = document.getElementById('portraitImg') || document.getElementById('avatarImg');
  var wrap = document.getElementById('portraitWrap') || document.getElementById('avatarWrap');
  if(!img || !wrap) return;
  prefix = prefix || '';
  var names = [];
  if(configured) names.push(configured);
  ['photo.jpg','photo.jpeg','photo.png','photo.webp',
   'photos.jpg','photos.jpeg','photos.png',
   'profile.jpg','profile.jpeg','profile.png','me.jpg','me.jpeg'].forEach(function(n){
    if(names.indexOf(n) === -1) names.push(n);
  });
  var i = 0;
  function tryNext(){
    if(i >= names.length){ wrap.hidden = true; return; }   // no photo present - hide cleanly
    img.src = prefix + names[i++] + '?t=' + Date.now();
  }
  img.addEventListener('load', function(){ if(img.naturalWidth > 1) wrap.hidden = false; });
  img.addEventListener('error', tryNext);
  tryNext();
}

function wireUp(){
  var nav=document.getElementById('nav');
  window.addEventListener('scroll',function(){
    nav.classList.toggle('scrolled', window.scrollY>20); },{passive:true});

  var btn=document.getElementById('menuBtn'), links=document.getElementById('navLinks');
  btn.addEventListener('click',function(){
    links.classList.toggle('open');
    btn.textContent = links.classList.contains('open') ? '✕' : '☰';
  });
  links.querySelectorAll('a').forEach(function(a){
    a.addEventListener('click',function(){ links.classList.remove('open'); btn.textContent='☰'; });
  });

  function goTo(el){
    if(!el) return;
    try { el.scrollIntoView({behavior:'smooth',block:'start'}); }
    catch(e){ el.scrollIntoView(true); }
    var before=window.scrollY;
    setTimeout(function(){
      if(Math.abs(window.scrollY-before)<2){
        var y=Math.max(0, el.getBoundingClientRect().top+window.scrollY-62);
        try { window.scrollTo({top:y,behavior:'instant'}); }
        catch(e){ document.documentElement.scrollTop=y; }
      }
    },260);
  }
  document.querySelectorAll('a[href^="#"]').forEach(function(a){
    var id=a.getAttribute('href').slice(1); if(!id) return;
    a.addEventListener('click',function(ev){
      var t=document.getElementById(id); if(!t) return;
      ev.preventDefault(); goTo(t);
      if(history.replaceState) history.replaceState(null,'','#'+id);
    });
  });
  if(location.hash.length>1){
    var t=document.getElementById(location.hash.slice(1));
    if(t) setTimeout(function(){ goTo(t); },80);
  }
}

fetch('data.json?t='+Date.now())
  .then(function(r){ if(!r.ok) throw new Error(r.status); return r.json(); })
  .then(render)
  .catch(function(err){
    console.error('data.json failed to load:',err);
    document.getElementById('loading').style.display='none';
    document.getElementById('loadError').style.display='block';
  });
</script>
