<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Md Abu Sayeb Rayhan — Research</title>
<meta name="description" content="Research homepage of Md Abu Sayeb Rayhan. Computer vision, embodied AI, multimodal vision-language models and generative simulation. Three peer-reviewed papers in IEEE Xplore and Springer Nature.">
<meta name="author" content="Md Abu Sayeb Rayhan">
<meta name="citation_author" content="Rayhan, Md Abu Sayeb">
<meta property="og:title" content="Md Abu Sayeb Rayhan — Research">
<meta property="og:description" content="Computer vision, embodied AI and multimodal vision-language models.">
<meta property="og:type" content="profile">
<link rel="icon" href="https://github.com/abusayeb.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Source+Serif+4:opsz,wght@8..60,400;8..60,600;8..60,700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --paper:#fbfaf7;--paper-2:#f4f2ed;--card:#fff;
  --ink:#1a1f2b;--ink-2:#3d4657;--muted:#6b7280;--faint:#9aa1ad;
  --rule:#e2ded5;--rule-2:#d3cec2;
  --accent:#8a2e2e;--accent-soft:#f5eceb;
  --navy:#1e3a5f;--kw:#fdf3d3;
  --max:830px;
}
html{scroll-behavior:smooth;-webkit-text-size-adjust:100%}
body{background:var(--paper);color:var(--ink);font-family:'Inter',-apple-system,sans-serif;
  font-size:16.5px;line-height:1.68;-webkit-font-smoothing:antialiased}
a{color:var(--accent);text-decoration:none}
a:hover{text-decoration:underline}
::selection{background:#e8dcc8}
.wrap{max-width:var(--max);margin:0 auto;padding:0 32px}

/* keyword highlight */
.kw{background:linear-gradient(transparent 62%, var(--kw) 62%);color:var(--ink);font-weight:600;padding:0 1px}

.topbar{border-bottom:1px solid var(--rule);background:rgba(251,250,247,.94);
  backdrop-filter:blur(10px);position:sticky;top:0;z-index:50}
.topbar-in{max-width:var(--max);margin:0 auto;padding:13px 32px;display:flex;
  justify-content:space-between;align-items:center;gap:18px;flex-wrap:wrap}
.tb-name{font-family:'Source Serif 4',Georgia,serif;font-weight:600;font-size:16px;color:var(--ink)}
.tb-links{display:flex;gap:18px;font-size:14px;flex-wrap:wrap}
.tb-links a{color:var(--ink-2)}
.tb-links a:hover{color:var(--accent)}
.tb-links a.switch{color:var(--accent);font-weight:600}

header.hero{padding:54px 0 38px}
.hero-grid{display:flex;gap:34px;align-items:flex-start}
.avatar-wrap{flex-shrink:0}
.avatar{width:132px;height:132px;border-radius:50%;object-fit:cover;
  border:1px solid var(--rule-2);display:block}
.hero-main{flex:1;min-width:0}
h1{font-family:'Source Serif 4',Georgia,serif;font-size:clamp(31px,5vw,40px);
  font-weight:700;letter-spacing:-.018em;line-height:1.15;margin-bottom:9px}
.subtitle{font-size:17px;color:var(--ink-2);font-weight:500;margin-bottom:5px}
.affil{color:var(--muted);font-size:15px;margin-bottom:14px}
.avail{display:inline-block;font-size:13.5px;color:var(--accent);background:var(--accent-soft);
  border:1px solid #ecd9d6;padding:5px 12px;border-radius:20px;margin-bottom:16px}
.contact-row{display:flex;gap:8px;flex-wrap:wrap;font-size:14px}
.contact-row a{color:var(--ink-2);border:1px solid var(--rule-2);background:var(--card);
  padding:5px 12px;border-radius:5px;transition:all .18s}
.contact-row a:hover{border-color:var(--accent);color:var(--accent);text-decoration:none}

section{padding:34px 0;border-top:1px solid var(--rule);scroll-margin-top:74px}
h2{font-family:'Source Serif 4',Georgia,serif;font-size:23px;font-weight:600;
  letter-spacing:-.012em;margin-bottom:16px;color:var(--ink)}
h3{font-size:16.5px;font-weight:650;margin-bottom:3px;letter-spacing:-.008em}
p{margin-bottom:14px;color:var(--ink-2)}
p:last-child{margin-bottom:0}
.lead{font-size:17px;line-height:1.75}
strong{color:var(--ink);font-weight:640}

/* news */
.news li{list-style:none;display:flex;gap:16px;padding:9px 0;border-bottom:1px dotted var(--rule);
  font-size:15px;color:var(--ink-2)}
.news li:last-child{border-bottom:none}
.news-date{flex:0 0 84px;color:var(--faint);font-size:13.5px;padding-top:2px;
  font-variant-numeric:tabular-nums}

.areas{display:grid;grid-template-columns:repeat(2,1fr);gap:13px;margin-top:20px}
.area{background:var(--card);border:1px solid var(--rule);border-radius:7px;padding:17px 19px}
.area-t{font-family:'Source Serif 4',Georgia,serif;font-size:15.5px;font-weight:600;
  margin-bottom:5px;color:var(--navy)}
.area-d{font-size:14.2px;color:var(--muted);line-height:1.58}

/* publications */
.pub-list{list-style:none;counter-reset:pub}
.pub-item{position:relative;padding:0 0 24px 34px;counter-increment:pub}
.pub-item:last-child{padding-bottom:0}
.pub-item::before{content:'[' counter(pub) ']';position:absolute;left:0;top:1px;
  color:var(--faint);font-size:13.5px;font-variant-numeric:tabular-nums}
.pub-t{font-family:'Source Serif 4',Georgia,serif;font-size:16.5px;font-weight:600;
  line-height:1.45;margin-bottom:5px;color:var(--ink)}
.pub-t a{color:var(--ink)}
.pub-t a:hover{color:var(--accent)}
.pub-authors{font-size:14.3px;color:var(--ink-2);margin-bottom:4px}
.pub-authors .me{font-weight:680;color:var(--ink);text-decoration:underline;text-underline-offset:2px}
.pub-venue{font-size:14.3px;color:var(--muted);font-style:italic;margin-bottom:8px}
.pub-tags{display:flex;gap:6px;flex-wrap:wrap;align-items:center}
.ptag{font-size:11.5px;letter-spacing:.03em;padding:2.5px 8px;border-radius:3px;
  background:var(--accent-soft);color:var(--accent);border:1px solid #ecd9d6;font-weight:500}
.ptag.n{background:#eef2f7;color:var(--navy);border-color:#dbe3ed}
.ptag.s{background:#f0f0ee;color:var(--muted);border-color:var(--rule)}
.bib-btn{font-size:11.5px;padding:2.5px 9px;border-radius:3px;background:var(--card);
  color:var(--ink-2);border:1px solid var(--rule-2);cursor:pointer;font-family:inherit;
  transition:all .18s}
.bib-btn:hover{border-color:var(--accent);color:var(--accent)}
.pub-note{font-size:13.9px;color:var(--muted);margin-top:8px;line-height:1.6}
.bib-box{display:none;margin-top:10px;background:#f7f6f2;border:1px solid var(--rule);
  border-radius:5px;padding:12px 14px;font-family:ui-monospace,SFMono-Regular,Menlo,monospace;
  font-size:12.3px;color:var(--ink-2);white-space:pre-wrap;line-height:1.5}
.bib-box.open{display:block}

.entry{margin-bottom:24px}
.entry:last-child{margin-bottom:0}
.entry-head{display:flex;justify-content:space-between;gap:16px;align-items:baseline;
  flex-wrap:wrap;margin-bottom:2px}
.entry-where{color:var(--muted);font-size:14.6px;margin-bottom:9px}
.entry-date{font-size:13.5px;color:var(--faint);white-space:nowrap;font-variant-numeric:tabular-nums}
.entry ul{list-style:none;margin-top:8px}
.entry ul li{position:relative;padding-left:17px;margin-bottom:7px;color:var(--ink-2);
  font-size:15px;line-height:1.62}
.entry ul li::before{content:'';position:absolute;left:2px;top:9px;width:4px;height:4px;
  border-radius:50%;background:var(--rule-2)}

.thesis-box{background:var(--paper-2);border:1px solid var(--rule);border-left:3px solid var(--navy);
  border-radius:0 7px 7px 0;padding:18px 21px;margin-top:14px}
.thesis-label{font-size:11.5px;letter-spacing:.09em;text-transform:uppercase;
  color:var(--muted);margin-bottom:6px;font-weight:600}
.thesis-title{font-family:'Source Serif 4',Georgia,serif;font-size:16px;font-weight:600;
  margin-bottom:7px;font-style:italic}
.thesis-box p{font-size:14.6px;margin-bottom:0;line-height:1.62}

.sk-row{display:flex;gap:14px;padding:9px 0;border-bottom:1px solid var(--rule);align-items:baseline}
.sk-row:last-child{border-bottom:none}
.sk-label{flex:0 0 152px;font-size:13.5px;font-weight:600;color:var(--navy)}
.sk-val{flex:1;font-size:14.6px;color:var(--ink-2)}

.simple-list{list-style:none}
.simple-list li{display:flex;gap:16px;padding:10px 0;border-bottom:1px dotted var(--rule);font-size:14.8px}
.simple-list li:last-child{border-bottom:none}
.sl-year{flex:0 0 84px;color:var(--faint);font-size:13.5px;font-variant-numeric:tabular-nums}
.sl-main{flex:1;color:var(--ink-2)}
.sl-main b{color:var(--ink);font-weight:640;display:block}

.refs{display:grid;grid-template-columns:repeat(3,1fr);gap:15px}
.ref{background:var(--card);border:1px solid var(--rule);border-radius:7px;padding:16px 18px}
.ref-n{font-weight:650;font-size:15px;margin-bottom:3px}
.ref-r{font-size:13.6px;color:var(--muted);line-height:1.5}

footer{border-top:1px solid var(--rule);padding:26px 0 40px;margin-top:18px;
  font-size:13.8px;color:var(--faint)}
.foot-in{max-width:var(--max);margin:0 auto;padding:0 32px;display:flex;
  justify-content:space-between;gap:14px;flex-wrap:wrap}

#loading{padding:80px 32px;text-align:center;color:var(--muted);font-size:15px}
#loadError{display:none;padding:60px 32px;max-width:640px;margin:0 auto;text-align:center}
#loadError h2{color:var(--accent)}

@media(max-width:720px){
  .wrap,.topbar-in,.foot-in{padding-left:22px;padding-right:22px}
  .hero-grid{flex-direction:column;gap:20px}
  .areas,.refs{grid-template-columns:1fr}
  .sk-row,.news li,.simple-list li{flex-direction:column;gap:3px}
  .sk-label,.news-date,.sl-year{flex:none}
  .tb-links{gap:13px;font-size:13.5px}
  header.hero{padding:34px 0 28px}
}
</style>
</head>
<body>

<div class="topbar">
  <div class="topbar-in">
    <span class="tb-name" id="tbName">Md Abu Sayeb Rayhan</span>
    <nav class="tb-links">
      <a href="#research">Research</a>
      <a href="#publications">Publications</a>
      <a href="#experience">Experience</a>
      <a href="#education">Education</a>
      <a href="../" class="switch">Industry portfolio →</a>
    </nav>
  </div>
</div>

<div id="loading">Loading…</div>

<div id="loadError">
  <h2>Content failed to load</h2>
  <p>Please reload the page. If this persists, reach me directly at
     <a href="mailto:sayeb.cc.75@gmail.com">sayeb.cc.75@gmail.com</a> or view my
     <a href="../abu_sayeb_rayhan_cv.pdf">CV (PDF)</a>.</p>
</div>

<main id="app" hidden></main>

<footer hidden id="foot">
  <div class="foot-in">
    <span>© <span id="yr">2026</span> <span id="footName"></span> · <span id="footLoc"></span></span>
    <span><a href="../">Industry portfolio</a> · <a href="../abu_sayeb_rayhan_cv.pdf" target="_blank" rel="noopener">Academic CV</a></span>
  </div>
</footer>

<script>
/* ---------- helpers ---------- */
function esc(s){ return String(s==null?'':s)
  .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
  .replace(/"/g,'&quot;'); }
// **term** -> highlighted keyword. Escapes first, so content stays safe.
function rich(s){ return esc(s).replace(/\*\*(.+?)\*\*/g, '<span class="kw">$1</span>'); }
function el(tag, html){ var e=document.createElement(tag); if(html!=null) e.innerHTML=html; return e; }

function bibtex(p, name){
  var venue = String(p.venue||'').split('·')[0].trim();
  return '@inproceedings{' + (p.bibkey||'rayhan'+(p.year||'')) + ',\n' +
    '  title     = {' + p.title + '},\n' +
    '  author    = {' + (name||'Rayhan, Md Abu Sayeb') + ' and others},\n' +
    '  booktitle = {' + venue + '},\n' +
    '  year      = {' + (p.year||'') + '}\n}';
}

/* ---------- render ---------- */
function render(d){
  var app = document.getElementById('app');
  var P = d.profile || {};
  var out = [];

  document.getElementById('tbName').textContent = P.name || '';
  document.title = (P.name||'') + ' — Research';

  /* hero */
  out.push('<div class="wrap"><header class="hero"><div class="hero-grid">' +
    '<div class="avatar-wrap" id="avatarWrap" hidden>' +
      '<img class="avatar" id="avatarImg" alt="' + esc(P.name) + '"' +
      (P.photoFocus ? ' style="object-position:' + esc(P.photoFocus) + '"' : '') + '>' +
    '</div><div class="hero-main">' +
      '<h1>' + esc(P.name) + '</h1>' +
      '<div class="subtitle">' + esc(P.roleResearch) + '</div>' +
      '<div class="affil">' + esc(P.location) + '</div>' +
      (P.availability ? '<div class="avail">' + esc(P.availability) + '</div>' : '') +
      '<div class="contact-row">' +
        '<a href="mailto:' + esc(P.email) + '">' + esc(P.email) + '</a>' +
        '<a href="../' + esc((d.cv||{}).academic) + '" target="_blank" rel="noopener">Academic CV (PDF)</a>' +
        (P.scholar ? '<a href="' + esc(P.scholar) + '" target="_blank" rel="noopener">Google Scholar</a>' : '') +
        (P.orcid ? '<a href="' + esc(P.orcid) + '" target="_blank" rel="noopener">ORCID</a>' : '') +
        '<a href="' + esc(P.linkedin) + '" target="_blank" rel="noopener">LinkedIn</a>' +
        '<a href="' + esc(P.github) + '" target="_blank" rel="noopener">GitHub</a>' +
      '</div></div></div></header>');

  /* news */
  if((d.news||[]).length){
    out.push('<section id="news"><h2>News</h2><ul class="news">' +
      d.news.map(function(n){
        return '<li><span class="news-date">' + esc(n.date) + '</span>' +
               '<span>' + rich(n.text) + '</span></li>';
      }).join('') + '</ul></section>');
  }

  /* research statement */
  out.push('<section id="research"><h2>Research interests</h2>' +
    (d.researchStatement||[]).map(function(p,i){
      return '<p' + (i===0?' class="lead"':'') + '>' + rich(p) + '</p>';
    }).join('') +
    ((d.researchAreas||[]).length ? '<div class="areas">' +
      d.researchAreas.map(function(a){
        return '<div class="area"><div class="area-t">' + esc(a.title) + '</div>' +
               '<div class="area-d">' + esc(a.desc) + '</div></div>';
      }).join('') + '</div>' : '') +
    '</section>');

  /* publications */
  if((d.publications||[]).length){
    out.push('<section id="publications"><h2>Publications</h2>' +
      '<p style="font-size:14.6px;color:var(--muted);margin-bottom:20px;">' +
      d.publications.length + ' peer-reviewed conference papers. ' +
      'Click <em>BibTeX</em> to copy a citation.</p><ol class="pub-list">' +
      d.publications.map(function(p,i){
        var title = p.link
          ? '<a href="' + esc(p.link) + '" target="_blank" rel="noopener">' + esc(p.title) + '</a>'
          : esc(p.title);
        var tags = (p.tags||[]).map(function(t){
          return '<span class="ptag' + (/springer|scopus/i.test(t)?' n':'') + '">' + esc(t) + '</span>';
        }).join('');
        var status = p.status ? '<span class="ptag s">' + esc(p.status) + '</span>' : '';
        return '<li class="pub-item">' +
          '<div class="pub-t">' + title + '</div>' +
          '<div class="pub-authors"><span class="me">' + esc(p.authors) + '</span></div>' +
          '<div class="pub-venue">' + esc(p.venue) + '</div>' +
          '<div class="pub-tags">' + tags + status +
            '<button class="bib-btn" data-bib="' + i + '">BibTeX</button></div>' +
          (p.note ? '<div class="pub-note">' + rich(p.note) + '</div>' : '') +
          '<pre class="bib-box" id="bib' + i + '">' + esc(bibtex(p, P.name)) + '</pre>' +
        '</li>';
      }).join('') + '</ol></section>');
  }

  /* experience */
  var research = (d.experience||[]).filter(function(e){ return e.kind==='research'; });
  var industry = (d.experience||[]).filter(function(e){ return e.kind!=='research'; });
  function entry(e){
    return '<div class="entry"><div class="entry-head">' +
      '<h3>' + esc(e.role) + (e.note ? ' <span style="font-weight:400;color:var(--faint);font-size:14px">(' + esc(e.note) + ')</span>' : '') + '</h3>' +
      '<span class="entry-date">' + esc(e.start) + ' – ' + esc(e.end) + '</span></div>' +
      '<div class="entry-where">' + esc(e.org) +
        (e.team ? ' · ' + esc(e.team) : '') +
        (e.location ? ' · ' + esc(e.location) : '') + '</div>' +
      '<ul>' + (e.bullets||[]).map(function(b){ return '<li>' + rich(b) + '</li>'; }).join('') + '</ul></div>';
  }
  out.push('<section id="experience">' +
    (research.length ? '<h2>Research experience</h2>' + research.map(entry).join('') : '') +
    (industry.length ? '<h2 style="margin-top:30px">Applied research &amp; engineering</h2>' + industry.map(entry).join('') : '') +
    '</section>');

  /* talks */
  if((d.talks||[]).length){
    out.push('<section id="talks"><h2>Conference presentations</h2><ul class="simple-list">' +
      d.talks.map(function(t){
        return '<li><span class="sl-year">' + esc(t.year) + '</span><span class="sl-main">' +
          '<b>' + esc(t.title) + '</b>' + esc(t.venue) +
          (t.type ? ' · ' + esc(t.type) : '') + '</span></li>';
      }).join('') + '</ul></section>');
  }

  /* education */
  var E = d.education || {};
  out.push('<section id="education"><h2>Education</h2><div class="entry">' +
    '<div class="entry-head"><h3>' + esc(E.degree) + '</h3>' +
    '<span class="entry-date">' + esc(E.start) + ' – ' + esc(E.end) + '</span></div>' +
    '<div class="entry-where">' + esc(E.school) + (E.grade ? ' · ' + esc(E.grade) : '') + '</div>' +
    (E.coursework ? '<p style="font-size:14.6px;margin-top:6px;margin-bottom:0;">Relevant coursework: ' + esc(E.coursework) + '</p>' : '') +
    (E.thesisTitle ? '<div class="thesis-box">' +
      '<div class="thesis-label">' + esc(E.thesisLabel) + '</div>' +
      '<div class="thesis-title">' + esc(E.thesisTitle) + '</div>' +
      '<p>' + rich(E.thesisDesc) + '</p></div>' : '') +
    '</div></section>');

  /* awards */
  if((d.awards||[]).length){
    out.push('<section id="awards"><h2>Awards &amp; activities</h2><ul class="simple-list">' +
      d.awards.map(function(a){
        return '<li><span class="sl-year">' + esc(a.year) + '</span><span class="sl-main">' +
          '<b>' + esc(a.title) + '</b>' + esc(a.detail) + '</span></li>';
      }).join('') + '</ul></section>');
  }

  /* skills */
  if((d.skills||[]).length){
    out.push('<section id="skills"><h2>Technical skills</h2>' +
      d.skills.map(function(s){
        return '<div class="sk-row"><div class="sk-label">' + esc(s.label) + '</div>' +
               '<div class="sk-val">' + esc(s.items) + '</div></div>';
      }).join('') + '</section>');
  }

  /* references */
  if((d.references||[]).length){
    out.push('<section id="references"><h2>References</h2>' +
      '<p style="font-size:14.6px;color:var(--muted);margin-bottom:16px;">Contact details available on request.</p>' +
      '<div class="refs">' + d.references.map(function(r){
        return '<div class="ref"><div class="ref-n">' + esc(r.name) + '</div>' +
               '<div class="ref-r">' + esc(r.role) + '<br>' + esc(r.org) + '</div></div>';
      }).join('') + '</div></section>');
  }

  out.push('</div>');
  app.innerHTML = out.join('');
  app.hidden = false;
  document.getElementById('loading').style.display = 'none';

  document.getElementById('footName').textContent = P.name || '';
  document.getElementById('footLoc').textContent = P.location || '';
  document.getElementById('yr').textContent = new Date().getFullYear();
  document.getElementById('foot').hidden = false;

  wireUp();
  loadPortrait(P.photo, '../');
}

/* ---------- interactions ---------- */
// Try the configured photo filename, then common variants, so an upload named
// slightly differently still shows up instead of silently failing.
function loadPortrait(configured, prefix){
  var img = document.getElementById('avatarImg'), wrap = document.getElementById('avatarWrap');
  if(!img || !wrap) return;
  prefix = prefix || '';
  var names = [];
  if(configured) names.push(configured);
  ['photo.jpg','photo.jpeg','photo.png','photo.webp',
   'photos.jpg','photos.jpeg','photos.png',
   'profile.jpg','profile.jpeg','profile.png','me.jpg','me.jpeg'].forEach(function(n){
    if(names.indexOf(n) === -1) names.push(n);
  });
  var i = 0;
  function tryNext(){
    if(i >= names.length){ wrap.hidden = true; return; }
    img.src = prefix + names[i++] + '?t=' + Date.now();
  }
  img.addEventListener('load', function(){ if(img.naturalWidth > 1) wrap.hidden = false; });
  img.addEventListener('error', tryNext);
  tryNext();
}

function wireUp(){

  // BibTeX toggle + copy
  document.querySelectorAll('.bib-btn').forEach(function(b){
    b.addEventListener('click', function(){
      var box = document.getElementById('bib'+b.dataset.bib);
      var open = box.classList.toggle('open');
      b.textContent = open ? 'Hide BibTeX' : 'BibTeX';
      if(open && navigator.clipboard){
        navigator.clipboard.writeText(box.textContent).then(function(){
          b.textContent = 'Copied ✓';
          setTimeout(function(){ if(box.classList.contains('open')) b.textContent='Hide BibTeX'; }, 1400);
        }).catch(function(){});
      }
    });
  });

  // reliable in-page navigation
  function goTo(el){
    if(!el) return;
    try { el.scrollIntoView({behavior:'smooth', block:'start'}); }
    catch(e){ el.scrollIntoView(true); }
    var before = window.scrollY;
    setTimeout(function(){
      if(Math.abs(window.scrollY-before) < 2){
        var y = Math.max(0, el.getBoundingClientRect().top + window.scrollY - 74);
        try { window.scrollTo({top:y, behavior:'instant'}); }
        catch(e){ document.documentElement.scrollTop = y; }
      }
    }, 260);
  }
  document.querySelectorAll('a[href^="#"]').forEach(function(a){
    var id = a.getAttribute('href').slice(1);
    if(!id) return;
    a.addEventListener('click', function(ev){
      var t = document.getElementById(id); if(!t) return;
      ev.preventDefault(); goTo(t);
      if(history.replaceState) history.replaceState(null,'','#'+id);
    });
  });
  if(location.hash.length>1){
    var t = document.getElementById(location.hash.slice(1));
    if(t) setTimeout(function(){ goTo(t); }, 80);
  }
}

/* ---------- boot ---------- */
fetch('../data.json?t=' + Date.now())
  .then(function(r){ if(!r.ok) throw new Error(r.status); return r.json(); })
  .then(render)
  .catch(function(err){
    console.error('data.json failed to load:', err);
    document.getElementById('loading').style.display='none';
    document.getElementById('loadError').style.display='block';
  });
</script>
